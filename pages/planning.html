<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기획 아웃라인 편집기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design System tokens (mirrors editor CSS variables) ── */
    :root {
      --ui-bg-app:      #1a1a1a;
      --ui-bg-base:     #1e1e1e;
      --ui-bg-elevated: #242424;
      --ui-bg-card:     #252525;
      --ui-bg-input:    #2a2a2a;
      --ui-border:      #2a2a2a;
      --ui-border-mid:  #333333;
      --ui-border-hi:   #404040;
      --ui-text:        #e0e0e0;
      --ui-text-sub:    #aaaaaa;
      --ui-text-muted:  #777777;
      --ui-danger:      #e06c6c;
      --ui-success:     #7fc87f;
      --ui-accent:      #22c48a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-bg-app); color: var(--ui-text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      height: 44px; background: var(--ui-bg-base); border-bottom: 1px solid var(--ui-border);
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      flex-shrink: 0; -webkit-app-region: drag;
    }
    #toolbar * { -webkit-app-region: no-drag; }
    .electron-app #toolbar { padding-left: 80px; }
    .electron-app.fullscreen #toolbar { padding-left: 16px; }

    .tool-logo { font-size: 12px; font-weight: 700; color: var(--ui-text-sub); letter-spacing: 0.4px; }

    .admin-badge {
      font-size: 10px; font-weight: 700; color: var(--ui-accent);
      background: rgba(34,196,138,0.12); border: 1px solid rgba(34,196,138,0.3);
      border-radius: 4px; padding: 2px 7px; letter-spacing: 0.05em;
    }

    .tool-sep { width: 1px; height: 18px; background: var(--ui-border-mid); margin: 0 4px; }

    #toolbar label { font-size: 11px; color: var(--ui-text-muted); }
    #vol-select {
      background: var(--ui-bg-input); color: var(--ui-text-sub); border: 1px solid var(--ui-border-hi);
      border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer;
    }
    #vol-select:focus { outline: none; border-color: var(--ui-accent); }

    #btn-save {
      background: var(--ui-accent); color: #0f1a15; border: none; border-radius: 5px;
      padding: 4px 14px; font-size: 11px; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    #btn-save:hover { background: #29d99a; }
    #btn-save:disabled { background: var(--ui-bg-input); color: var(--ui-text-muted); cursor: default; }

    #save-status { font-size: 10px; color: var(--ui-text-muted); font-family: monospace; }

    .back-btn {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      background: var(--ui-bg-card); border: 1px solid var(--ui-border-mid); border-radius: 5px;
      color: var(--ui-text-muted); font-size: 11px; padding: 4px 10px; cursor: pointer;
      text-decoration: none; transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover { background: var(--ui-bg-elevated); color: var(--ui-text); }

    /* ── Body layout ── */
    #body {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ── Left: Intake ── */
    #intake-panel {
      width: 260px; min-width: 220px; flex-shrink: 0;
      background: var(--ui-bg-base); border-right: 1px solid var(--ui-border);
      overflow-y: auto; padding: 16px 14px;
    }
    #intake-panel::-webkit-scrollbar { width: 4px; }
    #intake-panel::-webkit-scrollbar-thumb { background: var(--ui-border-mid); border-radius: 2px; }

    .intake-section { margin-bottom: 20px; }
    .intake-label {
      font-size: 10px; font-weight: 700; color: var(--ui-text-muted);
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid var(--ui-border);
    }
    .intake-row { margin-bottom: 8px; }
    .intake-row label { display: block; font-size: 10px; color: var(--ui-text-muted); margin-bottom: 3px; }
    .intake-row input,
    .intake-row textarea {
      width: 100%; background: var(--ui-bg-card); border: 1px solid var(--ui-border-mid);
      border-radius: 4px; color: var(--ui-text-sub); font-size: 11px; padding: 5px 8px;
      resize: vertical; font-family: inherit;
    }
    .intake-row input:focus,
    .intake-row textarea:focus { outline: none; border-color: var(--ui-accent); }
    .intake-row textarea { min-height: 60px; }

    .swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .swot-item label { font-size: 10px; color: var(--ui-text-muted); display: block; margin-bottom: 2px; }
    .swot-item textarea {
      width: 100%; background: var(--ui-bg-card); border: 1px solid var(--ui-border-mid);
      border-radius: 4px; color: var(--ui-text-sub); font-size: 10px; padding: 4px 6px;
      resize: vertical; min-height: 52px; font-family: inherit;
    }
    .swot-item textarea:focus { outline: none; border-color: var(--ui-accent); }

    /* ── Center: Outline ── */
    #outline-panel {
      flex: 1; overflow-y: auto; padding: 16px 18px; background: var(--ui-bg-app);
    }
    #outline-panel::-webkit-scrollbar { width: 5px; }
    #outline-panel::-webkit-scrollbar-thumb { background: var(--ui-border-mid); border-radius: 2px; }

    .outline-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .outline-panel-title { font-size: 11px; font-weight: 700; color: var(--ui-text-sub); text-transform: uppercase; letter-spacing: 0.6px; }
    .outline-hint { font-size: 10px; color: var(--ui-text-sub); }

    .outline-section { margin-bottom: 12px; }
    .outline-section-header { margin-bottom: 4px; }
    .sec-badge {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 800; letter-spacing: 0.6px;
      border: 1px solid; border-radius: 3px; padding: 1px 7px;
    }

    .outline-block {
      background: var(--ui-bg-elevated); border: 1px solid var(--ui-border);
      border-radius: 6px; margin-bottom: 6px;
      transition: border-color 0.15s;
      user-select: none; overflow: hidden;
    }
    .outline-block:hover { border-color: var(--ui-border-hi); }
    /* CLAUDE.md: selected는 outline만, background 금지 */
    .outline-block.selected { outline: 2px solid var(--ui-accent); outline-offset: 0; }
    .outline-block.disabled { opacity: 0.4; }
    .outline-block.dragging { opacity: 0.5; }
    /* drag-over: background 금지, outline 방식 */
    .outline-block.drag-over { outline: 2px solid #4a9ede; outline-offset: 0; }

    /* ── 블록 헤더 (라벨 행) ── */
    .block-header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--ui-border);
      cursor: pointer;
    }

    .grip { font-size: 13px; color: var(--ui-text-muted); cursor: grab; flex-shrink: 0; transition: color 0.15s; }
    .grip:hover { color: var(--ui-text-sub); }
    .grip:active { cursor: grabbing; }

    .block-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 12px; padding: 0; flex-shrink: 0; line-height: 1;
    }

    .block-role {
      font-size: 11px; font-weight: 600; color: var(--ui-text);
      font-family: monospace; min-width: 120px; flex-shrink: 0;
    }

    .block-layout {
      font-size: 10px; color: var(--ui-text-muted); background: var(--ui-bg-input);
      border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
      font-family: monospace;
    }

    .block-hint { font-size: 10px; color: var(--ui-text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── 헤드카피 영역 ── */
    .block-copy {
      padding: 12px 14px;
      font-size: 15px; font-weight: 500; line-height: 1.6;
      color: var(--ui-text);
      min-height: 52px;
      outline: none;
      cursor: text;
      user-select: text;
      word-break: keep-all;
    }
    .block-copy:empty::before {
      content: attr(data-placeholder);
      color: var(--ui-text-muted);
      font-size: 13px; font-weight: 400; font-style: italic;
      pointer-events: none;
    }

    /* ── Right: Inspector ── */
    #inspector-panel {
      width: 220px; min-width: 200px; flex-shrink: 0;
      background: var(--ui-bg-base); border-left: 1px solid var(--ui-border);
      overflow-y: auto; padding: 16px 14px;
    }
    #inspector-panel::-webkit-scrollbar { width: 4px; }
    #inspector-panel::-webkit-scrollbar-thumb { background: var(--ui-border-mid); border-radius: 2px; }

    .insp-empty { font-size: 11px; color: var(--ui-text-muted); text-align: center; padding: 30px 10px; line-height: 1.8; }
    .insp-title { font-size: 12px; font-weight: 700; color: var(--ui-text-sub); margin-bottom: 4px; font-family: monospace; }
    .insp-hint { font-size: 10px; color: var(--ui-text-muted); margin-bottom: 14px; line-height: 1.6; }

    .insp-row { margin-bottom: 12px; }
    .insp-row label { display: block; font-size: 10px; color: var(--ui-text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .insp-row select {
      width: 100%; background: var(--ui-bg-card); border: 1px solid var(--ui-border-mid);
      border-radius: 4px; color: var(--ui-text-sub); font-size: 11px; padding: 4px 7px; cursor: pointer;
    }
    .insp-row select:focus { outline: none; border-color: var(--ui-accent); }

    .toggle-btn {
      background: var(--ui-bg-input); border: 1px solid var(--ui-border-hi); border-radius: 4px;
      color: var(--ui-text-muted); font-size: 11px; font-weight: 700; padding: 3px 12px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.on { background: var(--ui-bg-input); border-color: var(--ui-accent); color: var(--ui-accent); }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <span class="tool-logo">상페마법사</span>
    <span class="admin-badge">관리자</span>
    <div class="tool-sep"></div>
    <label for="vol-select">볼륨</label>
    <select id="vol-select">
      <option value="outline">outline — 뼈대</option>
      <option value="develop1">develop1 — 기본</option>
      <option value="develop2" selected>develop2 — 중간</option>
      <option value="develop3">develop3 — 풀버전</option>
    </select>
    <div class="tool-sep"></div>
    <button id="btn-save">저장</button>
    <span id="save-status"></span>
    <a class="back-btn" href="projects.html">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="7,2 3,6 7,10"/>
      </svg>
      홈
    </a>
  </div>

  <!-- Body -->
  <div id="body">
    <!-- Left: Intake -->
    <div id="intake-panel">
      <div class="intake-section">
        <div class="intake-label">제품 정보</div>
        <div class="intake-row">
          <label for="inp-product">제품명 <span style="color:#e06c6c">*</span></label>
          <input id="inp-product" type="text" placeholder="예: 로도프 보풀제거기" required>
        </div>
        <div class="intake-row">
          <label for="inp-brand">브랜드명</label>
          <input id="inp-brand" type="text" placeholder="예: 로도프">
        </div>
      </div>

      <div class="intake-section">
        <div class="intake-label">포지셔닝 전략</div>
        <div class="intake-row">
          <label for="inp-positioning">시장 포지션 / 타겟 / 차별화</label>
          <textarea id="inp-positioning" placeholder="시장에서 이 제품이 점하는 위치, 핵심 차별화 전략, 타겟 고객 정의 등을 자유롭게 입력하세요."></textarea>
        </div>
      </div>

      <div class="intake-section">
        <div class="intake-label">SWOT 분석</div>
        <div class="swot-grid">
          <div class="swot-item">
            <label for="inp-strengths">강점 S</label>
            <textarea id="inp-strengths" placeholder="우리의 강점"></textarea>
          </div>
          <div class="swot-item">
            <label for="inp-weaknesses">약점 W</label>
            <textarea id="inp-weaknesses" placeholder="개선이 필요한 점"></textarea>
          </div>
          <div class="swot-item">
            <label for="inp-opportunities">기회 O</label>
            <textarea id="inp-opportunities" placeholder="시장 기회"></textarea>
          </div>
          <div class="swot-item">
            <label for="inp-threats">위협 T</label>
            <textarea id="inp-threats" placeholder="경쟁/환경 위협"></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Center: Outline -->
    <div id="outline-panel">
      <div class="outline-panel-header">
        <span class="outline-panel-title">아웃라인</span>
        <span class="outline-hint">블록을 드래그해 순서 변경 · ● 클릭으로 켜고 끄기</span>
      </div>
      <div id="outline-list"></div>
    </div>

    <!-- Right: Inspector -->
    <div id="inspector-panel">
      <p class="insp-empty">블록을 선택하면<br>상세 정보가 표시됩니다</p>
    </div>
  </div>

  <script src="../js/planning.js"></script>
  <script>
    // Electron titlebar offset
    if (window.electronAPI?.isElectron) {
      document.body.classList.add('electron-app');
      window.electronAPI.getFullscreen?.()?.then?.(v => {
        if (v) document.body.classList.add('fullscreen');
      });
      window.electronAPI.onFullscreenChange?.(v => {
        document.body.classList.toggle('fullscreen', v);
      });
    }
  </script>
</body>
</html>
