<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기획 아웃라인 편집기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a; color: #e0e0e0;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      height: 42px; background: #1e1e1e; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      flex-shrink: 0; -webkit-app-region: drag;
    }
    #toolbar * { -webkit-app-region: no-drag; }
    .electron-app #toolbar { padding-left: 86px; }
    .electron-app.fullscreen #toolbar { padding-left: 16px; }

    .tool-logo { font-size: 12px; font-weight: 700; color: #ccc; letter-spacing: 0.4px; }

    .admin-badge {
      font-size: 10px; font-weight: 700; color: #22c48a;
      background: rgba(34,196,138,0.12); border: 1px solid rgba(34,196,138,0.3);
      border-radius: 4px; padding: 2px 7px; letter-spacing: 0.05em;
    }

    .tool-sep { width: 1px; height: 18px; background: #333; margin: 0 4px; }

    #toolbar label { font-size: 11px; color: #777; }
    #vol-select {
      background: #2a2a2a; color: #ccc; border: 1px solid #404040;
      border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer;
    }
    #vol-select:focus { outline: none; border-color: #22c48a; }

    #btn-save {
      background: #22c48a; color: #0f1a15; border: none; border-radius: 5px;
      padding: 4px 14px; font-size: 11px; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    #btn-save:hover { background: #29d99a; }
    #btn-save:disabled { background: #2a4a3a; color: #555; cursor: default; }

    #save-status { font-size: 10px; color: #555; font-family: monospace; }

    .back-btn {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      background: #252525; border: 1px solid #333; border-radius: 5px;
      color: #888; font-size: 11px; padding: 4px 10px; cursor: pointer;
      text-decoration: none; transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover { background: #2e2e2e; color: #ccc; }

    /* ── Body layout ── */
    #body {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ── Left: Intake ── */
    #intake-panel {
      width: 260px; min-width: 220px; flex-shrink: 0;
      background: #1e1e1e; border-right: 1px solid #2a2a2a;
      overflow-y: auto; padding: 16px 14px;
    }
    #intake-panel::-webkit-scrollbar { width: 4px; }
    #intake-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .intake-section { margin-bottom: 20px; }
    .intake-label {
      font-size: 10px; font-weight: 700; color: #666;
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid #2a2a2a;
    }
    .intake-row { margin-bottom: 8px; }
    .intake-row label { display: block; font-size: 10px; color: #777; margin-bottom: 3px; }
    .intake-row input,
    .intake-row textarea {
      width: 100%; background: #252525; border: 1px solid #333;
      border-radius: 4px; color: #ddd; font-size: 11px; padding: 5px 8px;
      resize: vertical; font-family: inherit;
    }
    .intake-row input:focus,
    .intake-row textarea:focus { outline: none; border-color: #22c48a; }
    .intake-row textarea { min-height: 60px; }

    .swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .swot-item label { font-size: 9px; color: #666; display: block; margin-bottom: 2px; }
    .swot-item textarea {
      width: 100%; background: #252525; border: 1px solid #333;
      border-radius: 4px; color: #ddd; font-size: 10px; padding: 4px 6px;
      resize: vertical; min-height: 52px; font-family: inherit;
    }
    .swot-item textarea:focus { outline: none; border-color: #22c48a; }

    /* ── Center: Outline ── */
    #outline-panel {
      flex: 1; overflow-y: auto; padding: 16px 18px; background: #191919;
    }
    #outline-panel::-webkit-scrollbar { width: 5px; }
    #outline-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .outline-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .outline-panel-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.6px; }
    .outline-hint { font-size: 10px; color: #555; }

    .outline-section { margin-bottom: 12px; }
    .outline-section-header { margin-bottom: 4px; }
    .sec-badge {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 800; letter-spacing: 0.6px;
      border: 1px solid; border-radius: 3px; padding: 1px 7px;
    }

    .outline-block {
      display: flex; align-items: center; gap: 8px;
      background: #222; border: 1px solid #2c2c2c;
      border-radius: 5px; padding: 6px 10px; margin-bottom: 3px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .outline-block:hover { background: #272727; border-color: #383838; }
    .outline-block.selected { border-color: #22c48a; background: #1a2e24; }
    .outline-block.disabled { opacity: 0.4; }
    .outline-block.dragging { opacity: 0.5; }
    .outline-block.drag-over { border-color: #4a9ede; background: #1a2535; }

    .grip { font-size: 13px; color: #444; cursor: grab; flex-shrink: 0; }
    .grip:active { cursor: grabbing; }

    .block-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 12px; padding: 0; flex-shrink: 0; line-height: 1;
    }

    .block-role {
      font-size: 11px; font-weight: 600; color: #ccc;
      font-family: monospace; min-width: 140px; flex-shrink: 0;
    }

    .block-layout {
      font-size: 9px; color: #666; background: #2a2a2a;
      border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
      font-family: monospace;
    }

    .block-hint { font-size: 10px; color: #555; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Right: Inspector ── */
    #inspector-panel {
      width: 220px; min-width: 200px; flex-shrink: 0;
      background: #1e1e1e; border-left: 1px solid #2a2a2a;
      overflow-y: auto; padding: 16px 14px;
    }
    #inspector-panel::-webkit-scrollbar { width: 4px; }
    #inspector-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .insp-empty { font-size: 11px; color: #555; text-align: center; padding: 30px 10px; line-height: 1.8; }
    .insp-title { font-size: 12px; font-weight: 700; color: #ccc; margin-bottom: 4px; font-family: monospace; }
    .insp-hint { font-size: 10px; color: #777; margin-bottom: 14px; line-height: 1.6; }

    .insp-row { margin-bottom: 12px; }
    .insp-row label { display: block; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .insp-row select {
      width: 100%; background: #252525; border: 1px solid #333;
      border-radius: 4px; color: #ccc; font-size: 11px; padding: 4px 7px; cursor: pointer;
    }
    .insp-row select:focus { outline: none; border-color: #22c48a; }

    .toggle-btn {
      background: #2a2a2a; border: 1px solid #404040; border-radius: 4px;
      color: #888; font-size: 11px; font-weight: 700; padding: 3px 12px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.on { background: #1a3a2a; border-color: #22c48a; color: #22c48a; }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <span class="tool-logo">상페마법사</span>
    <span class="admin-badge">관리자</span>
    <div class="tool-sep"></div>
    <label for="vol-select">볼륨</label>
    <select id="vol-select">
      <option value="outline">outline — 뼈대</option>
      <option value="develop1">develop1 — 기본</option>
      <option value="develop2" selected>develop2 — 중간</option>
      <option value="develop3">develop3 — 풀버전</option>
    </select>
    <div class="tool-sep"></div>
    <button id="btn-save">저장</button>
    <span id="save-status"></span>
    <a class="back-btn" href="projects.html">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="7,2 3,6 7,10"/>
      </svg>
      홈
    </a>
  </div>

  <!-- Body -->
  <div id="body">
    <!-- Left: Intake -->
    <div id="intake-panel">
      <div class="intake-section">
        <div class="intake-label">제품 정보</div>
        <div class="intake-row">
          <label>제품명</label>
          <input id="inp-product" type="text" placeholder="예: 로도프 보풀제거기">
        </div>
        <div class="intake-row">
          <label>브랜드명</label>
          <input id="inp-brand" type="text" placeholder="예: 로도프">
        </div>
      </div>

      <div class="intake-section">
        <div class="intake-label">포지셔닝 전략</div>
        <div class="intake-row">
          <textarea id="inp-positioning" placeholder="시장에서 이 제품이 점하는 위치, 핵심 차별화 전략, 타겟 고객 정의 등을 자유롭게 입력하세요."></textarea>
        </div>
      </div>

      <div class="intake-section">
        <div class="intake-label">SWOT 분석</div>
        <div class="swot-grid">
          <div class="swot-item">
            <label>강점 S</label>
            <textarea id="inp-strengths" placeholder="우리의 강점"></textarea>
          </div>
          <div class="swot-item">
            <label>약점 W</label>
            <textarea id="inp-weaknesses" placeholder="개선이 필요한 점"></textarea>
          </div>
          <div class="swot-item">
            <label>기회 O</label>
            <textarea id="inp-opportunities" placeholder="시장 기회"></textarea>
          </div>
          <div class="swot-item">
            <label>위협 T</label>
            <textarea id="inp-threats" placeholder="경쟁/환경 위협"></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Center: Outline -->
    <div id="outline-panel">
      <div class="outline-panel-header">
        <span class="outline-panel-title">아웃라인</span>
        <span class="outline-hint">블록을 드래그해 순서 변경 · ● 클릭으로 켜고 끄기</span>
      </div>
      <div id="outline-list"></div>
    </div>

    <!-- Right: Inspector -->
    <div id="inspector-panel">
      <p class="insp-empty">블록을 선택하면<br>상세 정보가 표시됩니다</p>
    </div>
  </div>

  <script src="../js/planning.js"></script>
  <script>
    // Electron titlebar offset
    if (window.electronAPI?.isElectron) {
      document.body.classList.add('electron-app');
      window.electronAPI.getFullscreen?.()?.then?.(v => {
        if (v) document.body.classList.add('fullscreen');
      });
      window.electronAPI.onFullscreenChange?.(v => {
        document.body.classList.toggle('fullscreen', v);
      });
    }
  </script>
</body>
</html>
