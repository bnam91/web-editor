<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOYA DESIGN EDITOR — 라이선스 인증</title>
  <link rel="stylesheet" href="../assets/fonts/pretendard.css">
  <link rel="stylesheet" href="../css/design-tokens.css">
  <style>
    /* 디자인 토큰 alias */
    :root {
      --ui-bg-app: var(--bg-app);
      --ui-bg-elevated: var(--bg-elevated);
      --ui-bg-card: var(--bg-card);
      --ui-bg-input: var(--bg-input);
      --ui-bg-hover: var(--bg-hover);
      --ui-border: var(--border-default);
      --ui-border-mid: var(--border-mid);
      --ui-text: var(--text-default);
      --ui-text-sub: var(--text-sub);
      --ui-text-muted: var(--text-muted);
      --ui-text-dim: var(--text-dim);
      --ui-danger: var(--color-danger);
      --ui-success: var(--color-success);
      --ui-accent-primary: var(--color-accent);
      --ui-accent-primary-hover: var(--color-accent-hover);
      --ui-accent-primary-active: var(--p-blue-800);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--ui-bg-app);
      color: var(--ui-text);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }

    .card {
      background: var(--ui-bg-elevated);
      border: 1px solid var(--ui-border);
      border-radius: 8px;
      padding: 40px 36px 32px;
      width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      -webkit-app-region: no-drag;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--ui-accent-primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--ui-text);
    }

    .logo-sub {
      font-size: 12px;
      color: var(--ui-text-muted);
      margin-top: 1px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--ui-text);
    }

    .desc {
      font-size: 13px;
      color: var(--ui-text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
      word-break: keep-all;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--ui-text-sub);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .label-optional {
      color: var(--ui-text-dim);
      font-size: 11px;
      text-transform: none;
      font-weight: 400;
    }

    input[type="text"] {
      width: 100%;
      background: var(--ui-bg-input);
      border: 1px solid var(--ui-border);
      border-radius: 6px;
      color: var(--ui-text);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input[type="text"]:focus {
      border-color: var(--ui-accent-primary);
    }

    input[type="text"]::placeholder {
      color: var(--ui-text-dim);
    }

    .field {
      margin-bottom: 16px;
    }

    .btn {
      width: 100%;
      background: var(--ui-accent-primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:hover { background: var(--ui-accent-primary-hover); }
    .btn:active { background: var(--ui-accent-primary-active); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      margin-top: 14px;
      font-size: 13px;
      min-height: 18px;
      text-align: center;
    }

    .status.error { color: var(--ui-danger); }
    .status.success { color: var(--ui-success); }
    .status.info { color: var(--ui-text-muted); }

    /* IP 한도 초과 화면 */
    .ip-list-section {
      display: none;
    }

    .ip-list-section.visible {
      display: block;
    }

    .ip-list {
      list-style: none;
      margin: 12px 0 16px;
    }

    .ip-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--ui-bg-card);
      border: 1px solid var(--ui-border);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .ip-list .ip-addr { color: var(--ui-text); font-family: monospace; }
    .ip-list .ip-alias { color: var(--ui-text-muted); font-size: 12px; margin-left: 8px; }
    .ip-list .ip-date { color: var(--ui-text-dim); font-size: 11px; }

    .btn-delete {
      background: none;
      border: 1px solid var(--ui-border-mid);
      border-radius: 4px;
      color: var(--ui-danger);
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn-delete:hover { background: rgba(255,107,107,0.1); }

    .btn-back {
      background: var(--ui-bg-card);
      color: var(--ui-text-sub);
      margin-top: 8px;
    }

    .btn-back:hover { background: var(--ui-bg-hover); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">GOYA DESIGN EDITOR</div>
      <div class="logo-sub">License Activation</div>
    </div>
  </div>

  <!-- 기본 라이선스 입력 화면 -->
  <div id="mainSection">
    <h2>라이선스 인증</h2>
    <p class="desc">이 기기에서 처음 실행 중입니다.<br>발급받은 라이선스 키를 입력해 주세요.</p>

    <div class="field">
      <label>라이선스 키</label>
      <input type="text" id="licenseKey" placeholder="WE-XXXXXX" maxlength="9" autocomplete="off" spellcheck="false">
    </div>

    <div class="field">
      <label>사용자명 <span class="label-optional">(선택)</span></label>
      <input type="text" id="userId" placeholder="홍길동" maxlength="20" autocomplete="off">
    </div>

    <button class="btn" id="registerBtn" onclick="handleRegister()">인증하기</button>
    <div class="status info" id="statusMsg">
      현재 공인 IP를 확인하는 중...
    </div>
  </div>

  <!-- IP 한도 초과 화면 -->
  <div id="ipLimitSection" class="ip-list-section">
    <h2>기기 한도 초과</h2>
    <p class="desc">이 라이선스에 최대 5개의 기기가 등록되어 있습니다.<br>기존 기기를 삭제하고 현재 기기를 등록하세요.</p>

    <ul class="ip-list" id="ipList"></ul>

    <button class="btn" id="retryBtn" onclick="retryAfterDelete()">등록 재시도</button>
    <button class="btn btn-back" onclick="showMain()">← 돌아가기</button>
    <div class="status error" id="ipLimitStatus"></div>
  </div>
</div>

<script>
  let currentIp = null;
  let currentLicenseKey = null;

  async function init() {
    try {
      currentIp = await window.electronAPI.getPublicIp();
      if (currentIp) {
        document.getElementById('statusMsg').textContent = `현재 IP: ${currentIp}`;
      } else {
        document.getElementById('statusMsg').textContent = '네트워크 연결을 확인해 주세요.';
        document.getElementById('statusMsg').className = 'status error';
      }
    } catch (e) {
      document.getElementById('statusMsg').textContent = '오류: ' + e.message;
      document.getElementById('statusMsg').className = 'status error';
    }
  }

  async function handleRegister() {
    const key = document.getElementById('licenseKey').value.trim().toUpperCase();
    const userId = document.getElementById('userId').value.trim();
    const btn = document.getElementById('registerBtn');
    const statusEl = document.getElementById('statusMsg');

    if (!key) {
      statusEl.textContent = '라이선스 키를 입력해 주세요.';
      statusEl.className = 'status error';
      return;
    }

    if (!currentIp) {
      statusEl.textContent = '공인 IP를 확인할 수 없습니다. 네트워크를 확인해 주세요.';
      statusEl.className = 'status error';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>인증 중...';
    statusEl.textContent = '';
    statusEl.className = 'status';

    try {
      const result = await window.electronAPI.registerLicense(key, currentIp, userId);

      if (result.success) {
        statusEl.textContent = '인증 완료! 잠시 후 이동합니다...';
        statusEl.className = 'status success';
        setTimeout(() => {
          window.electronAPI.navigateToProjects();
        }, 800);
        return;
      }

      switch (result.reason) {
        case 'invalid_key':
          statusEl.textContent = '유효하지 않은 라이선스 키입니다.';
          break;
        case 'inactive':
          statusEl.textContent = '비활성화된 라이선스입니다. 관리자에게 문의하세요.';
          break;
        case 'expired':
          statusEl.textContent = '만료된 라이선스입니다.';
          break;
        case 'userId_reserved':
          statusEl.textContent = '사용할 수 없는 사용자명입니다.';
          break;
        case 'userId_taken':
          statusEl.textContent = '이미 사용 중인 사용자명입니다.';
          break;
        case 'ip_limit':
          currentLicenseKey = key;
          showIpLimitScreen(result.allowedIps);
          return;
        default:
          statusEl.textContent = '오류가 발생했습니다. 다시 시도해 주세요.';
      }
      statusEl.className = 'status error';
    } catch (e) {
      statusEl.textContent = '연결 오류: ' + e.message;
      statusEl.className = 'status error';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '인증하기';
    }
  }

  function showIpLimitScreen(ips) {
    document.getElementById('mainSection').style.display = 'none';
    const section = document.getElementById('ipLimitSection');
    section.classList.add('visible');

    const ul = document.getElementById('ipList');
    ul.innerHTML = '';
    ips.forEach(entry => {
      const date = new Date(entry.registeredAt).toLocaleDateString('ko-KR');
      const li = document.createElement('li');
      li.innerHTML = `
        <div>
          <span class="ip-addr">${entry.ip}</span>
          ${entry.alias ? `<span class="ip-alias">${entry.alias}</span>` : ''}
          <br><span class="ip-date">${date} 등록</span>
        </div>
        <button class="btn-delete" onclick="deleteIp('${entry.ip}')">삭제</button>
      `;
      ul.appendChild(li);
    });
  }

  async function deleteIp(ip) {
    const statusEl = document.getElementById('ipLimitStatus');
    statusEl.textContent = '삭제 중...';
    statusEl.className = 'status info';

    try {
      const result = await window.electronAPI.removeLicenseIp(currentLicenseKey, ip);
      if (result.success) {
        // 해당 li 제거
        const btns = document.querySelectorAll('.btn-delete');
        btns.forEach(btn => {
          if (btn.getAttribute('onclick').includes(ip)) {
            btn.closest('li').remove();
          }
        });
        statusEl.textContent = `${ip} 삭제 완료. 이제 등록 재시도를 클릭하세요.`;
        statusEl.className = 'status success';
      } else {
        statusEl.textContent = '삭제 실패: ' + (result.error || result.reason);
        statusEl.className = 'status error';
      }
    } catch (e) {
      statusEl.textContent = '오류: ' + e.message;
      statusEl.className = 'status error';
    }
  }

  async function retryAfterDelete() {
    showMain();
    // 잠깐 후 자동 재시도
    setTimeout(() => handleRegister(), 100);
  }

  function showMain() {
    document.getElementById('mainSection').style.display = 'block';
    document.getElementById('ipLimitSection').classList.remove('visible');
    document.getElementById('licenseKey').value = currentLicenseKey || '';
  }

  // Enter 키 바인딩
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const section = document.getElementById('ipLimitSection');
      if (section.classList.contains('visible')) return;
      handleRegister();
    }
  });

  // 라이선스 키 자동 대문자 + 하이픈 포맷팅
  document.getElementById('licenseKey').addEventListener('input', (e) => {
    let v = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
    e.target.value = v;
  });

  // Electron 신호등(트래픽 라이트) 영역 회피용 클래스 토글
  if (window.electronAPI?.isElectron) {
    document.body.classList.add('electron-app');
    window.electronAPI.getFullscreen?.().then(isFullscreen => {
      document.body.classList.toggle('fullscreen', isFullscreen);
    });
    window.electronAPI.onFullscreenChange?.(isFullscreen => {
      document.body.classList.toggle('fullscreen', isFullscreen);
    });
  }

  init();
</script>
</body>
</html>
